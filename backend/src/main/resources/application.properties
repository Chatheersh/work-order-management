# Application
spring.application.name=work-order-management
server.port=8080

# H2 in-memory database (swap for PostgreSQL in production — see comments below)
spring.datasource.url=jdbc:h2:mem:workorderdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# H2 console (disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- To switch to PostgreSQL, replace the three lines above with: ---
# spring.datasource.url=jdbc:postgresql://localhost:5432/workorderdb
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=<user>
# spring.datasource.password=<password>
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
