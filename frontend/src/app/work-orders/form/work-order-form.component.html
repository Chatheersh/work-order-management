<div class="form-page">
  <h1>{{ isEditMode ? 'Edit Work Order' : 'New Work Order' }}</h1>

  <div *ngIf="errorMessage" class="error-banner">{{ errorMessage }}</div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="work-order-form">

    <div class="form-group">
      <label for="title">Title <span class="required">*</span></label>
      <input
        id="title"
        type="text"
        formControlName="title"
        placeholder="Describe the work to be done"
      />
      <div *ngIf="f['title'].invalid && f['title'].touched" class="field-error">
        Title is required.
      </div>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea
        id="description"
        formControlName="description"
        rows="4"
        placeholder="Additional details..."
      ></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="status">Status <span class="required">*</span></label>
        <select id="status" formControlName="status">
          <option *ngFor="let s of statuses" [value]="s">{{ s | titlecase }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="priority">Priority <span class="required">*</span></label>
        <select id="priority" formControlName="priority">
          <option *ngFor="let p of priorities" [value]="p">{{ p | titlecase }}</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="assignee">Assignee</label>
      <input
        id="assignee"
        type="text"
        formControlName="assignee"
        placeholder="Name or email"
      />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid || submitting">
        {{ submitting ? 'Saving...' : (isEditMode ? 'Update' : 'Create') }}
      </button>
      <a routerLink="/work-orders" class="btn btn-secondary">Cancel</a>
    </div>

  </form>
</div>
