<div class="form-container">
  <h1>{{ isEditMode ? 'Edit Work Order' : 'New Work Order' }}</h1>

  @if (errorMessage) {
    <div class="error-banner">{{ errorMessage }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="work-order-form">

    <div class="form-field">
      <label for="title">Title <span class="required">*</span></label>
      <input id="title" formControlName="title" type="text" placeholder="Enter a descriptive title" />
      @if (form.get('title')?.invalid && form.get('title')?.touched) {
        <span class="field-error">Title is required.</span>
      }
    </div>

    <div class="form-field">
      <label for="description">Description</label>
      <textarea id="description" formControlName="description" rows="4"
                placeholder="Describe the work to be done"></textarea>
    </div>

    <div class="form-row">
      <div class="form-field">
        <label for="status">Status <span class="required">*</span></label>
        <select id="status" formControlName="status">
          @for (s of statuses; track s) {
            <option [value]="s">{{ formatLabel(s) }}</option>
          }
        </select>
      </div>

      <div class="form-field">
        <label for="priority">Priority <span class="required">*</span></label>
        <select id="priority" formControlName="priority">
          @for (p of priorities; track p) {
            <option [value]="p">{{ formatLabel(p) }}</option>
          }
        </select>
      </div>
    </div>

    <div class="form-field">
      <label for="assignee">Assignee</label>
      <input id="assignee" formControlName="assignee" type="text" placeholder="Assign to someone" />
    </div>

    <div class="form-actions">
      <button type="button" (click)="onCancel()" class="btn-secondary">Cancel</button>
      <button type="submit" [disabled]="form.invalid || submitting" class="btn-primary">
        {{ submitting ? 'Saving...' : (isEditMode ? 'Update' : 'Create') }}
      </button>
    </div>

  </form>
</div>
